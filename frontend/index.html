<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="shortcut icon" href="./src/imagems/logo.png" type="image/x-icon">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="src/css/reset.css">
    <link rel="stylesheet" href="src/css/estilos.css">
    <link rel="stylesheet" href="src/css/responsivo.css">

    <title>Visionário Frases</title>
</head>
<body>

<header class="cabecalho">
    <a>
        <img class="logo" src="src/imagems/logo.png" alt="logo de lobo azul">
    </a>

    <nav class="menu-lateral">
        <div class="btn-expandir">
            <i class="bi bi-list" id="btn-exp"></i>
        </div>
        <ul>
            <li class="item-menu ativo">
                <a href="#">
                    <span class="icon"><i class="bi bi-house-door"></i></span>
                    <span class="txt-link">Início</span>
                </a>
            </li>

            <li class="item-menu">
                <a href="#">
                    <span class="icon"><i class="bi bi-book"></i></span>
                    <span class="txt-link">Livros</span>
                </a>
            </li>

            <li class="item-menu">
                <a href="#">
                    <span class="icon"><i class="bi bi-youtube"></i></span>
                    <span class="txt-link">YouTube</span>
                </a>
            </li>

            <li class="item-menu">
                <a href="#">
                    <span class="icon"><i class="bi bi-mortarboard"></i></span>
                    <span class="txt-link">Cursos</span>
                </a>
            </li>

            <li class="item-menu">
                <a href="#">
                    <span class="icon"><i class="bi bi-controller"></i></span>
                    <span class="txt-link">Jogos</span>
                </a>
            </li>

            <li class="item-menu">
                <a href="#">
                    <span class="icon"><i class="bi bi-instagram"></i></span>
                    <span class="txt-link">Instagram</span>
                </a>
            </li>

            <li class="item-menu">
                <a href="#">
                    <span class="icon"><i class="bi bi-tiktok"></i></span>
                    <span class="txt-link">TikTok</span>
                </a>
            </li>

            <li class="item-menu">
                <a href="#">
                    <span class="icon"><i class="bi bi-telegram"></i></span>
                    <span class="txt-link">Telegram</span>
                </a>
            </li>
        </ul>
    </nav>
</header>

<main class="corpo-da-pagina">
   <img class="imagem-fundo" src="src/imagems/blackblue.png">
    <div class="top-bar">
        <div class="view-counter">
            <span id="view-count">0</span> visualizações
        </div>

        <div id="login-container" class="login-container">
            <h2>Login</h2>
            <form id="login-form">
                <input type="text" id="username" placeholder="Usuário" required>
                <input type="password" id="password" placeholder="Senha" required>
                <button type="submit">Entrar</button>
            </form>
            <p id="login-message" class="message"></p>
            
            <div id="user-info" class="user-info" style="display: none;">
                <span id="welcome-text"></span>
                <button id="add-frase-btn">Nova Frase</button>
                <button id="logout-btn">Sair</button>
            </div>
        </div>

       <div class="informacoes-titulo-principal">
        <h1 class="titulo-supremo">visionário</h1>
        </div>
    </div>

    <div id="add-frase-modal" class="modal">
        <div class="modal-content">
            <h2>Nova Frase</h2>
            <form id="add-frase-form">
                <input type="text" id="frase-titulo" placeholder="Título da frase (ex: Frase 5)" required>
                <textarea id="frase-texto" placeholder="Digite a frase completa aqui..." rows="5" required></textarea>
                <div class="modal-buttons">
                    <button type="button" id="cancel-btn">Cancelar</button>
                    <button type="submit">Adicionar Frase</button>
                </div>
            </form>
        </div>
    </div>

    <ul class="listagem-frases" id="frases-container">
    </ul>

    <ul class="personagem">
        <li class="cartao-fundo">
            <img class="imagem-lateral-noctis" src="src/imagems/noctis.png"/>
        </li>
    </ul>

</main>

<script src="./src/js/index.js"></script>
<script src="./src/js/frases.js"></script>
<script src="./src/js/auth.js"></script>

</body>
</html>
